name: Backend CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bake_ocr_models:
        description: "Bake PaddleOCR models into the Docker image"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ap-northeast-2
  AWS_ACCOUNT_ID: "974346102227"
  ECR_REPOSITORY: capturemate-ai
  ECS_CLUSTER: capturemate-ai
  ECS_SERVICE: capturemate-ai
  ECS_TASK_DEFINITION: capturemate-ai
  ECS_CONTAINER_NAME: capturemate-ai
  HEALTHCHECK_URL: https://api.cloudnetaaws.click/health/ready
  PYTHON_VERSION: "3.12"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile Python modules
        run: |
          python -m py_compile \
            app/auth.py \
            app/config.py \
            app/main.py \
            app/models.py \
            app/ocr/paddle_engine.py \
            tests/test_auth.py \
            tests/test_health_and_ocr.py

      - name: Run unit tests
        run: python -m unittest discover -s tests

  build-and-push:
    name: Build and push image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    outputs:
      image_uri: ${{ steps.image.outputs.image_uri }}
      short_sha: ${{ steps.image.outputs.short_sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image metadata
        id: image
        shell: bash
        run: |
          set -euo pipefail

          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE_BASE_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}"

          echo "short_sha=${SHORT_SHA}" >> "${GITHUB_OUTPUT}"
          echo "image_base_uri=${IMAGE_BASE_URI}" >> "${GITHUB_OUTPUT}"
          echo "image_uri=${IMAGE_BASE_URI}:${SHORT_SHA}" >> "${GITHUB_OUTPUT}"

      - name: Build and push linux/amd64 image
        shell: bash
        run: |
          set -euo pipefail

          SHORT_SHA="${{ steps.image.outputs.short_sha }}"
          IMAGE_BASE_URI="${{ steps.image.outputs.image_base_uri }}"
          BAKE_OCR_MODELS="${{ github.event.inputs.bake_ocr_models || 'true' }}"

          TAG_ARGS=(--tag "${IMAGE_BASE_URI}:${SHORT_SHA}")
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            TAG_ARGS+=(--tag "${IMAGE_BASE_URI}:latest")
          fi

          docker buildx build \
            --platform linux/amd64 \
            --build-arg "BAKE_OCR_MODELS=${BAKE_OCR_MODELS}" \
            "${TAG_ARGS[@]}" \
            --push \
            .

  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Render new task definition
        shell: bash
        env:
          IMAGE_URI: ${{ needs.build-and-push.outputs.image_uri }}
        run: |
          set -euo pipefail

          aws ecs describe-task-definition \
            --task-definition "${ECS_TASK_DEFINITION}" \
            --query taskDefinition \
            > task-definition.json

          jq \
            --arg container_name "${ECS_CONTAINER_NAME}" \
            --arg image_uri "${IMAGE_URI}" \
            '
            if ([.containerDefinitions[].name] | index($container_name)) == null then
              error("container not found in task definition: " + $container_name)
            else
              .
            end
            | del(
                .taskDefinitionArn,
                .revision,
                .status,
                .requiresAttributes,
                .compatibilities,
                .registeredAt,
                .registeredBy
              )
            | .containerDefinitions |= map(
                if .name == $container_name then
                  .image = $image_uri
                else
                  .
                end
              )
            ' \
            task-definition.json \
            > task-definition-rendered.json

      - name: Register task definition
        id: register-task-definition
        shell: bash
        run: |
          set -euo pipefail

          TASK_DEFINITION_ARN="$(
            aws ecs register-task-definition \
              --cli-input-json file://task-definition-rendered.json \
              --query 'taskDefinition.taskDefinitionArn' \
              --output text
          )"

          echo "task_definition_arn=${TASK_DEFINITION_ARN}" >> "${GITHUB_OUTPUT}"

      - name: Update ECS service
        shell: bash
        run: |
          set -euo pipefail

          aws ecs update-service \
            --cluster "${ECS_CLUSTER}" \
            --service "${ECS_SERVICE}" \
            --task-definition "${{ steps.register-task-definition.outputs.task_definition_arn }}" \
            --force-new-deployment \
            > /dev/null

          aws ecs wait services-stable \
            --cluster "${ECS_CLUSTER}" \
            --services "${ECS_SERVICE}"

      - name: Verify deployed service health
        shell: bash
        run: |
          set -euo pipefail

          for attempt in {1..30}; do
            if curl --fail --silent --show-error "${HEALTHCHECK_URL}"; then
              exit 0
            fi

            echo "Health check failed. Retrying ${attempt}/30..."
            sleep 10
          done

          echo "Health check failed after retries: ${HEALTHCHECK_URL}" >&2
          exit 1
